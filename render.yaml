services:
  - type: web
    name: codesync-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    envVars:
      - key: PORT
        value: 3001
      - key: JWT_SECRET
        generateValue: true
      - key: ROOM_EXPIRY_MS
        value: 1800000
      - key: MAX_USERS_PER_ROOM
        value: 5
      - key: CLIENT_URL
        sync: false
    healthCheckPath: /api/health
